name: Build Android APK

# Builds an Android APK for the EIS Device Lock app on every push that
# touches android-app/, and uploads it as a downloadable Actions artifact.
#
# When you push a tag like v1.0.0 it also attaches a signed release APK to
# a GitHub Release (requires the signing secrets — see secrets section below).
#
# Required repository secrets:
#   GOOGLE_SERVICES_JSON          base64-encoded contents of google-services.json
#                                 from Firebase Console → Project Settings → Your apps → Android.
#                                 Encode:  base64 -i google-services.json | pbcopy   (macOS)
#                                 Then paste as repo secret in Settings → Secrets → Actions.
#
# Optional secrets (only needed for SIGNED release builds, which the
# Android Setup Wizard QR provisioning flow requires):
#   ANDROID_KEYSTORE_BASE64       base64-encoded *.keystore file
#   ANDROID_KEYSTORE_PASSWORD     the keystore password you set
#   ANDROID_KEY_ALIAS             the key alias inside the keystore
#   ANDROID_KEY_PASSWORD          the key password
#
# Without the signing secrets the workflow still produces a DEBUG APK which
# is fine for in-shop testing on a single phone but not for Setup Wizard QR.

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-build.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Build signed release APK (requires keystore secrets)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write  # needed for creating GitHub Releases on tag push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Verify google-services.json secret is set
        env:
          GS_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GS_JSON" ]; then
            echo "::error::Repository secret GOOGLE_SERVICES_JSON is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions."
            echo "::error::Encode locally with:  base64 -i google-services.json | pbcopy"
            exit 1
          fi

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android-app/app/google-services.json
          # Sanity check — must contain project_id
          grep -q "project_id" android-app/app/google-services.json \
            || { echo "::error::Decoded google-services.json looks malformed."; exit 1; }

      - name: Generate gradle wrapper jar (one-time, in case it's not committed)
        working-directory: android-app
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x ./gradlew

      # --- DEBUG BUILD (always runs) -------------------------------------
      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: eis-device-lock-debug-${{ github.sha }}
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # --- RELEASE BUILD (only on tag push, or when manually requested) ---
      - name: Decode signing keystore (release builds only)
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_release == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 is not set — skipping release build."
            echo "skip_release=true" >> $GITHUB_ENV
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android-app/app/release.keystore
          echo "skip_release=false" >> $GITHUB_ENV

      - name: Build signed release APK
        if: (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_release == 'true') && env.skip_release == 'false'
        working-directory: android-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Compute APK signing cert checksum (for ANDROID_APK_SIGNATURE_CHECKSUM env var)
        if: (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_release == 'true') && env.skip_release == 'false'
        run: |
          APK=android-app/app/build/outputs/apk/release/app-release.apk
          CHECKSUM=$(keytool -list -printcert -jarfile "$APK" \
            | grep -E '^\s+SHA256:' | head -n1 \
            | awk '{print $2}' | tr -d ':' | xxd -r -p \
            | openssl base64 | tr '+/' '-_' | tr -d '=\n')
          echo "APK signing cert checksum (use this as ANDROID_APK_SIGNATURE_CHECKSUM on the backend):"
          echo "  $CHECKSUM"
          echo "APK_CHECKSUM=$CHECKSUM" >> $GITHUB_ENV

      - name: Upload signed release APK as workflow artifact
        if: (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_release == 'true') && env.skip_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: eis-device-lock-release-${{ github.sha }}
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Attach release APK to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v') && env.skip_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/release/app-release.apk
          body: |
            ## EIS Device Lock — ${{ github.ref_name }}

            ### Backend env vars to set after this release
            ```
            ANDROID_APK_DOWNLOAD_URL       = (paste the URL of the .apk asset below)
            ANDROID_APK_SIGNATURE_CHECKSUM = ${{ env.APK_CHECKSUM }}
            ```

            Built from commit ${{ github.sha }}.
